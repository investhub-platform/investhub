openapi: 3.0.3
info:
  title: InvestHub API
  description: OpenAPI specification (starter) for InvestHub backend. Covers auth, users, wallets, startups, requests (investments), and admin endpoints.
  version: 1.0.0
servers:
  - url: "{baseUrl}"
    description: API server (use your deployed or local base URL)
    variables:
      baseUrl:
        default: "https://investhub-backend.onrender.com/api"
        description: Base API URL (eg. https://localhost:5000/api)
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        email:
          type: string
        roles:
          type: array
          items:
            type: string
    AuthRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string
    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
    Wallet:
      type: object
      properties:
        _id:
          type: string
        userId:
          type: string
        balance:
          type: number
        currency:
          type: string
    Transaction:
      type: object
      properties:
        _id:
          type: string
        walletId:
          type: string
        userId:
          type: string
        type:
          type: string
        amount:
          type: number
        status:
          type: string
        description:
          type: string
    Startup:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        fundingGoal:
          type: number
        currentFunding:
          type: number
    InvestmentRequest:
      type: object
      required: [investorId, founderId, ideaId, amount]
      properties:
        investorId:
          type: string
        founderId:
          type: string
        ideaId:
          type: string
        amount:
          type: number
        message:
          type: string
        direction:
          type: string

paths:
  /auth/login:
    post:
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        '200':
          description: Auth tokens
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /users/me:
    get:
      summary: Get current authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /wallets/me:
    get:
      summary: Get wallet for current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Wallet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Wallet'

  /requests:
    post:
      summary: Create an investment request (investor -> founder)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvestmentRequest'
      responses:
        '201':
          description: Created request

  /startups:
    get:
      summary: List startups
      responses:
        '200':
          description: Startup list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Startup'

  /startups/{id}:
    get:
      summary: Get startup by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Startup
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Startup'

  /admin/platform-income:
    get:
      summary: Admin - platform income overview
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Platform income payload

  /wallets/notify:
    post:
      summary: PayHere webhook notify
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
      responses:
        '200':
          description: Notification processed

  /transactions:
    get:
      summary: List transactions (optionally filter by user)
      parameters:
        - name: userId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Transactions list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Transaction'

tags:
  - name: auth
  - name: users
  - name: wallets
  - name: startups
  - name: admin
  - name: transactions
