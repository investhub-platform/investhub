name: Keep Render Awake
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render app health endpoint
        env:
          TARGET_URL: ${{ secrets.RENDER_APP_URL }}
          AUTH_TOKEN: ${{ secrets.RENDER_HEALTH_TOKEN }}
        run: |
          # Set the repository secret `RENDER_APP_URL` to your app URL (e.g. https://your-app.onrender.com/health)
          if [ -z "$TARGET_URL" ]; then
            echo "Error: RENDER_APP_URL secret is not set. Please add it in repository Settings → Secrets."
            exit 1
          fi

          # Use a short timeout and return only the HTTP status code
          if [ -n "$AUTH_TOKEN" ]; then
            curl -s --max-time 10 -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $AUTH_TOKEN" "$TARGET_URL" || true
          else
            curl -s --max-time 10 -o /dev/null -w "%{http_code}" "$TARGET_URL" || true
          fi