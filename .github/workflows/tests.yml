name: CI Tests

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Set OPENROUTER_API_KEY for CI (no secrets required)
        run: echo "OPENROUTER_API_KEY=dummy-test-api-key" >> $GITHUB_ENV

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint || true

      - name: Run frontend tests
        working-directory: frontend
        env:
          VITE_API_BASE: ${{ secrets.E2E_BASE_URL || 'http://localhost:5000' }}
        run: npm test --silent

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        env:
          OPENROUTER_API_KEY: ${{ env.OPENROUTER_API_KEY }}
        run: npm test --silent

      # Playwright E2E removed from CI to avoid requiring repository secrets or a deployed test target.
      # If you want E2E in CI later, add a deployment step and set E2E_* secrets, then re-enable here.
